<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0f172a" />
  <meta name="description" content="Controle de manutenção offline com sincronização opcional para Firebase." />
  <title>Controle de Manutenção</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <div>
      <h1>Controle de Manutenção</h1>
      <p class="subtitle">Desenvolvido por Gabriel Felipe dos Santos © 2026</p>
    </div>
    <div class="status-wrap">
      <span id="connectionBadge" class="badge neutral">Verificando conexão...</span>
      <span id="firebaseBadge" class="badge neutral">Firebase: carregando...</span>
    </div>
  </header>

  <main class="container">
    <section class="card grid-summary">
      <div class="summary-box">
        <span class="summary-label">OS totais</span>
        <strong id="totalOs">0</strong>
      </div>
      <div class="summary-box">
        <span class="summary-label">Pendentes de sync</span>
        <strong id="pendingOs">0</strong>
      </div>
      <div class="summary-box">
        <span class="summary-label">Sincronizadas</span>
        <strong id="syncedOs">0</strong>
      </div>
    </section>

    <section class="card">
      <div class="section-header">
        <h2>Nova Ordem de Serviço</h2>
        <button id="syncNowBtn" class="btn secondary" type="button">Sincronizar agora</button>
      </div>

      <form id="osForm" class="form-grid">
        <label>
          Número da OS
          <input type="text" id="numero_os" required placeholder="Ex.: OS-2026-001" />
        </label>

        <label>
          Data de abertura
          <input type="date" id="data_abertura" required />
        </label>

        <label>
          Equipamento
          <input type="text" id="equipamento_nome" required placeholder="Ex.: Sonda 03" />
        </label>

        <label>
          Local
          <input type="text" id="local" required placeholder="Ex.: Frente Norte" />
        </label>

        <label>
          Mecânico
          <input type="text" id="mecanico" required placeholder="Nome do responsável" />
        </label>

        <label>
          Solicitante
          <input type="text" id="solicitante" placeholder="Quem solicitou" />
        </label>

        <label>
          Prioridade
          <select id="prioridade" required>
            <option value="">Selecione</option>
            <option>Baixa</option>
            <option>Média</option>
            <option>Alta</option>
            <option>Crítica</option>
          </select>
        </label>

        <label>
          Status
          <select id="status" required>
            <option>Aberta</option>
            <option>Em andamento</option>
            <option>Concluída</option>
            <option>Cancelada</option>
          </select>
        </label>

        <label class="full-width">
          Descrição do serviço
          <textarea id="descricao" rows="4" required placeholder="Descreva a manutenção realizada ou solicitada"></textarea>
        </label>

        <label class="full-width">
          Observação
          <textarea id="observacao" rows="3" placeholder="Observações adicionais"></textarea>
        </label>

        <div class="form-actions full-width">
          <button class="btn primary" type="submit">Salvar OS</button>
          <button class="btn ghost" type="reset">Limpar</button>
        </div>
      </form>

      <p id="message" class="message"></p>
    </section>

    <section class="card">
      <div class="section-header">
        <h2>Ordens registradas</h2>
        <div class="actions-inline">
          <input type="search" id="searchInput" placeholder="Buscar por OS, equipamento ou mecânico" />
          <button id="exportCsvBtn" class="btn secondary" type="button">Exportar CSV</button>
        </div>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>OS</th>
              <th>Data</th>
              <th>Equipamento</th>
              <th>Mecânico</th>
              <th>Status</th>
              <th>Prioridade</th>
              <th>Sync</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody id="osTableBody"></tbody>
        </table>
      </div>
    </section>
  </main>

  <template id="rowTemplate">
    <tr>
      <td data-field="numero_os"></td>
      <td data-field="data_abertura"></td>
      <td data-field="equipamento_nome"></td>
      <td data-field="mecanico"></td>
      <td data-field="status"></td>
      <td data-field="prioridade"></td>
      <td data-field="sync_status"></td>
      <td class="row-actions">
        <button class="btn mini danger" data-action="delete" type="button">Excluir</button>
      </td>
    </tr>
  </template>

  <script type="module" src="app.js"></script>
</body>
</html>
